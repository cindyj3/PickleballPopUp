<!DOCTYPE html>
<html>

<head>
  <title>Pickleball PopUp</title>

  <style>
  body {
    font-family: Arial, sans-serif;
    margin: 40px;
    background: #f7f7f7;
  }

  h1 {
    color: #2c3e50;
  }

  input {
    padding: 8px;
    margin-right: 10px;
  }

  button {
    padding: 8px 14px;
    background: #2ecc71;
    border: none;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #27ae60;
  }

  ul {
    margin-top: 20px;
  }

  li {
    padding: 6px;
    background: white;
    margin-bottom: 6px;
    border-radius: 4px;
  }
  </style>

</head>

<body>

<h1>🏓 Pickleball PopUp</h1>

<h2>Create Game</h2>

<input id="location" placeholder="Location">
<input id="time" placeholder="Time">
<button onclick="createGame()">Create Game</button>

<h2>Available Games</h2>

<button onclick="loadGames()">Refresh Games</button>

<ul id="gamesList"></ul>

<script>

const API = "https://pickleballpopup.onrender.com/api"

async function loadGames() {

  const res = await fetch(API + "/games")
  const games = await res.json()

  const list = document.getElementById("gamesList")
  list.innerHTML = ""

  games.forEach(game => {
  const li = document.createElement("li");
  li.textContent = `${game.Location || game.location} - ${game.Time || game.time}`;
  list.appendChild(li);
});
}

async function createGame() {

const location = document.getElementById("location").value
const time = document.getElementById("time").value

const res = await fetch(API + "/games", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
  location,
  time,
  username: "Cindy"
})})

const data = await res.json()
console.log(data)

loadGames()
}

loadGames()

</script>

</body>
</html>
